<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yungang No-Text Blueprint</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f1ec;
      --panel: #fffdf8;
      --line: #d7d2c8;
      --shadow: rgba(39, 27, 12, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(218, 208, 191, 0.35), transparent 34%),
        linear-gradient(180deg, #f8f6f1 0%, var(--bg) 100%);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 24px;
    }

    .frame {
      width: min(96vw, 1280px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 48px var(--shadow);
      padding: 18px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="frame">
    <img src="./yungang-no-text.svg" alt="Clean no-text duplicate of the original floor plan sketch">
  </main>
</body>
</html>
